document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

255,255,255,.1);border-radius:4px;padding:1px 5px\">F6<\u002Fkbd>Ön Kasa<\u002Fbutton>\n        <button class=\"fl\" style=\"gap:7px;height:36px;padding:0 13px;border-radius:9px;background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.4);color:#fff;font-size:13px;font-weight:700;cursor:pointer\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>Düzenle<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CURRENCY BAR -->\n    <div class=\"fl\" style=\"align-items:stretch;flex-shrink:0;background:#0a1020;border-top:1px solid rgba(255,255,255,.05)\">\n      <div class=\"fl\" style=\"padding:0 18px;min-width:228px;font-size:11px;font-weight:800;letter-spacing:1px;color:#7d8699\">GÜNLÜK KUR (TCMB ALIŞ)<\u002Fdiv>\n      <sc-for list=\"{{ currencies }}\" as=\"c\" hint-placeholder-count=\"8\">\n        <div style=\"flex:1;display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.05)\">\n          <div style=\"background:rgba(16,185,129,.14);padding:6px 12px;font-size:12px;font-weight:700;letter-spacing:.5px;color:#6ee7b7\">{{ c.code }}<\u002Fdiv>\n          <div class=\"fl\" style=\"justify-content:space-between;padding:9px 12px\"><span style=\"font-size:15px;font-weight:800;color:#e7ebf2\">{{ c.rate }}<\u002Fspan><span style=\"font-size:11px;color:#6b7488\">{{ c.base }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- TEMPLATE GALLERY -->\n  <sc-if value=\"{{ galleryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeGallery }}\" style=\"position:fixed;inset:0;background:rgba(8,12,22,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px\">\n      <div onclick=\"{{ stop }}\" style=\"width:840px;max-width:100%;background:#fff;border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.4);overflow:hidden\">\n        <div class=\"fl\" style=\"justify-content:space-between;padding:18px 22px;border-bottom:1px solid #eef0f4\">\n          <div style=\"display:flex;flex-direction:column;line-height:1.25\"><span style=\"font-size:17px;font-weight:800;color:#1a2233\">Ana Ekran Şablonları<\u002Fspan><span style=\"font-size:12.5px;color:#8a93a6\">Bir şablon seçin — ana sayfa anında güncellenir ve hatırlanır<\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{ closeGallery }}\" class=\"fl\" style=\"justify-content:center;width:34px;height:34px;border-radius:9px;background:#f1f3f6;border:1px solid #e7e9ee;color:#5b6472;cursor:pointer\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:20px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <sc-for list=\"{{ templates }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"border:2px solid {{ t.borderCol }};border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:11px\">\n              <div style=\"height:118px;background:#f4f5f8;border:1px solid #e7e9ee;border-radius:9px;padding:8px;display:flex;flex-direction:column;gap:5px\">\n                <div class=\"fl\" style=\"gap:5px\"><div style=\"flex:1;height:13px;background:linear-gradient(100deg,#101a33,#16223f);border-radius:4px\"><\u002Fdiv><sc-if value=\"{{ t.pvWeather }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:32px;height:13px;background:#cfe0f5;border-radius:4px\"><\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                <div class=\"fl\" style=\"flex:1;gap:5px;align-items:stretch\"><div style=\"flex:1;background:#fff;border:1px solid #e7e9ee;border-radius:5px\"><\u002Fdiv><div style=\"width:28px;background:#fff;border:1px solid #e7e9ee;border-radius:5px\"><\u002Fdiv><\u002Fdiv>\n                <sc-if value=\"{{ t.pvOps }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"fl\" style=\"gap:5px;height:22px\"><div style=\"flex:1;background:#eef6ff;border-radius:4px\"><\u002Fdiv><div style=\"flex:1;background:#fff7ed;border-radius:4px\"><\u002Fdiv><div style=\"flex:1;background:#ecfdf5;border-radius:4px\"><\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div class=\"fl\" style=\"justify-content:space-between;gap:8px\"><span style=\"font-size:14.5px;font-weight:700;color:#1a2233\">{{ t.name }}<\u002Fspan><sc-if value=\"{{ t.saved }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:800;letter-spacing:.5px;color:#047857;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:6px;padding:2px 7px\">KAYITLI<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <span style=\"font-size:12px;color:#6b7280;line-height:1.4;min-height:50px\">{{ t.desc }}<\u002Fspan>\n              <button onclick=\"{{ t.onApply }}\" class=\"fl\" style=\"justify-content:center;gap:7px;height:38px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;background:{{ t.btnBg }};color:{{ t.btnFg }};border:1px solid {{ t.btnBorder }}\">{{ t.btnLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    activeFloor: 'all',\n    template: 'operasyon',\n    galleryOpen: false,\n    done: 0,\n    hk: [\n      {id:'h1', room:'108', type:'DBL', note:'Çıkış sonrası tam temizlik', tag:'Kirli'},\n      {id:'h2', room:'305', type:'SNG', note:'Mini bar yenileme + havlu', tag:'Temizleniyor'},\n      {id:'h3', room:'212', type:'SUI', note:'Ekstra nevresim talebi', tag:'Bekliyor'},\n    ],\n    faults: [\n      {id:'f1', room:'410', kind:'Tesisat', note:'Jakuzi pompası arızalı', sev:'Yüksek', time:'08:12'},\n      {id:'f2', room:'415', kind:'Elektrik', note:'Banyo aydınlatması yanmıyor', sev:'Orta', time:'07:40'},\n      {id:'f3', room:'118', kind:'Mobilya', note:'Çalışma sandalyesi kırık', sev:'Düşük', time:'Dün 19:05'},\n    ],\n    requests: [\n      {id:'r1', room:'112', guest:'A. Öztürk', req:'Geç çıkış talebi — 14:00', pr:'VIP', time:'5 dk'},\n      {id:'r2', room:'205', guest:'H. Weber', req:'Ek yastık & şampanya', pr:'Normal', time:'12 dk'},\n      {id:'r3', room:'118', guest:'S. Johnson', req:'Havaalanı transferi 16:30', pr:'Acil', time:'25 dk'},\n      {id:'r4', room:'104', guest:'F. Kaya', req:'Oda servisi — kahvaltı', pr:'Normal', time:'40 dk'},\n    ],\n  };\n\n  complete(listKey, id) {\n    this.setState(s => ({ [listKey]: s[listKey].filter(x => x.id !== id), done: s.done + 1 }));\n  }\n\n  componentDidMount() {\n    try { const t = localStorage.getItem('pms-home-template'); if (t) this.setState({ template: t }); } catch (e) {}\n  }\n\n  setTemplate(id) {\n    try { localStorage.setItem('pms-home-template', id); } catch (e) {}\n    this.setState({ template: id, galleryOpen: false });\n  }\n\n  styleFor(r){\n    const t = r.dirty ? 'kirli' : r.status;\n    const M = {\n      bos:    {bg:'#ffffff', fg:'#9aa3b2', num:'#334155', accent:'#e2e6ee', border:'#e7e9ee', label:'BOŞ'},\n      kirli:  {bg:'#fffdf5', fg:'#b45309', num:'#334155', accent:'#f59e0b', border:'#f6e4bf', label:'BOŞ · KİRLİ'},\n      dolu:   {bg:'#f0fdf7', fg:'#059669', num:'#065f46', accent:'#10b981', border:'#c9eddc', label:'DOLU'},\n      giris:  {bg:'#eff6ff', fg:'#2563eb', num:'#1e40af', accent:'#3b82f6', border:'#d2e3fd', label:'GİRİŞ'},\n      cikis:  {bg:'#fff7ed', fg:'#ea580c', num:'#9a3412', accent:'#f59e0b', border:'#fae0c0', label:'ÇIKIŞ'},\n      rezerve:{bg:'#f7f5ff', fg:'#7c3aed', num:'#5b21b6', accent:'#8b5cf6', border:'#e3daff', label:'REZERVE'},\n      dnd:    {bg:'#fff1f2', fg:'#e11d48', num:'#9f1239', accent:'#f43f5e', border:'#ffd3d9', label:'DND'},\n      ariza:  {bg:'#fdf2f2', fg:'#dc2626', num:'#991b1b', accent:'#ef4444', border:'#f6cdcd', label:'ARIZA'},\n    };\n    return M[t] || M.bos;\n  }\n\n  renderVals(){\n    const D = [\n      {floor:1, rooms:[\n        {no:'101',type:'DBL',status:'bos'},{no:'102',type:'DBL',status:'bos'},{no:'103',type:'TWN',status:'bos'},\n        {no:'104',type:'DBL',status:'dolu',guest:'F. Kaya'},{no:'105',type:'SNG',status:'bos'},{no:'107',type:'TRP',status:'bos'},\n        {no:'108',type:'DBL',status:'bos',dirty:true},{no:'109',type:'TWN',status:'bos'},{no:'110',type:'SNG',status:'bos'},\n        {no:'111',type:'DBL',status:'bos'},{no:'112',type:'SUI',status:'dolu',guest:'A. Öztürk'},{no:'113',type:'DBL',status:'bos'},\n        {no:'114',type:'TRP',status:'bos'},{no:'115',type:'SUI',status:'bos'},{no:'116',type:'DBL',status:'bos'},\n        {no:'117',type:'DBL',status:'bos'},{no:'118',type:'DBL',status:'dolu',guest:'S. Johnson'},\n      ]},\n      {floor:2, rooms:[\n        {no:'201',type:'DBL',status:'bos'},{no:'202',type:'DBL',status:'bos'},{no:'203',type:'TWN',status:'bos'},\n        {no:'204',type:'DBL',status:'rezerve',guest:'J. Miller'},{no:'205',type:'DBL',status:'dolu',guest:'H. Weber'},\n        {no:'207',type:'TRP',status:'bos'},{no:'208',type:'DBL',status:'bos'},{no:'209',type:'TWN',status:'bos'},\n        {no:'210',type:'SNG',status:'bos'},{no:'211',type:'DBL',status:'bos'},{no:'212',type:'SUI',status:'bos',dirty:true},\n        {no:'213',type:'DBL',status:'bos'},{no:'214',type:'TRP',status:'bos'},{no:'215',type:'SUI',status:'bos'},\n        {no:'216',type:'DBL',status:'bos'},{no:'217',type:'DBL',status:'bos'},{no:'218',type:'TWN',status:'bos'},\n      ]},\n      {floor:3, rooms:[\n        {no:'301',type:'DBL',status:'bos'},{no:'302',type:'DBL',status:'bos'},{no:'303',type:'TWN',status:'bos'},\n        {no:'304',type:'DBL',status:'bos'},{no:'305',type:'SNG',status:'bos',dirty:true},{no:'307',type:'TRP',status:'bos'},\n        {no:'308',type:'DBL',status:'bos'},{no:'309',type:'TWN',status:'bos'},{no:'310',type:'SNG',status:'bos'},\n        {no:'311',type:'DBL',status:'bos'},{no:'312',type:'DBL',status:'dnd',guest:'Rahatsız etme'},{no:'313',type:'DBL',status:'bos'},\n        {no:'314',type:'TRP',status:'bos'},{no:'315',type:'SUI',status:'bos'},{no:'316',type:'DBL',status:'bos'},\n        {no:'317',type:'DBL',status:'bos'},{no:'318',type:'TWN',status:'bos'},\n      ]},\n      {floor:4, rooms:[\n        {no:'401',type:'DBL',status:'bos'},{no:'402',type:'DBL',status:'bos'},{no:'403',type:'TWN',status:'bos'},\n        {no:'404',type:'DBL',status:'bos'},{no:'405',type:'SNG',status:'bos'},{no:'407',type:'TRP',status:'bos'},\n        {no:'408',type:'DBL',status:'bos'},{no:'409',type:'TWN',status:'bos'},{no:'410',type:'DBL',status:'ariza',guest:'Bakımda'},\n        {no:'411',type:'DBL',status:'bos'},{no:'412',type:'TWN',status:'bos'},{no:'413',type:'DBL',status:'bos'},\n        {no:'414',type:'TRP',status:'bos'},{no:'415',type:'SUI',status:'ariza',guest:'Jakuzi bakım'},{no:'416',type:'DBL',status:'bos'},\n        {no:'417',type:'DBL',status:'bos'},{no:'418',type:'TWN',status:'bos'},\n      ]},\n      {floor:5, rooms:[\n        {no:'501',type:'DBL',status:'bos'},{no:'502',type:'DBL',status:'bos'},{no:'503',type:'TWN',status:'bos'},\n        {no:'504',type:'DBL',status:'bos'},{no:'505',type:'SNG',status:'bos'},{no:'507',type:'TRP',status:'bos'},\n        {no:'508',type:'TWN',status:'rezerve',guest:'01.07'},{no:'509',type:'TWN',status:'bos'},{no:'510',type:'SNG',status:'bos'},\n      ]},\n    ];\n\n    const floors = D.map(f => ({\n      floor: f.floor, count: f.rooms.length,\n      rooms: f.rooms.map(r => {\n        const st = this.styleFor(r);\n        const dot = ['dolu','giris','cikis'].includes(r.status);\n        return { no:r.no, type:r.type, statusLabel:st.label, fg:st.fg, bg:st.bg, accent:st.accent, border:st.border, num:st.num, right:r.guest||'', hasGuest:!!r.guest, dot };\n      })\n    }));\n    const visibleFloors = this.state.activeFloor === 'all' ? floors : floors.filter(f => String(f.floor) === this.state.activeFloor);\n\n    const tabsRaw = [{k:'all',label:'Tüm rack',kbd:'F12'},{k:'1',label:'1. Kat'},{k:'2',label:'2. Kat'},{k:'3',label:'3. Kat'},{k:'4',label:'4. Kat'},{k:'5',label:'5. Kat'}];\n    const floorTabs = tabsRaw.map(t => {\n      const active = this.state.activeFloor === t.k;\n      return { label:t.label, kbd:t.kbd||'', hasKbd:!!t.kbd,\n        bg: active ? 'rgba(16,185,129,.12)' : '#ffffff', fg: active ? '#047857' : '#64748b', border: active ? 'rgba(16,185,129,.4)' : '#e7e9ee',\n        onClick: () => this.setState({ activeFloor: t.k }) };\n    });\n\n    const legRaw = [['dolu','DOLU'],['bos','BOŞ'],['giris','GİRİŞ'],['cikis','ÇIKIŞ'],['rezerve','REZERVE'],['dnd','DND'],['ariza','ARIZA']];\n    const legend = legRaw.map(x => { const st = this.styleFor({status:x[0]}); return { label:x[1], fg:st.fg, border:st.border, accent:st.accent }; });\n\n    const rates = {USD:'32,18',EUR:'34,76',GBP:'40,92',CHF:'36,04',SAR:'8,58',RUB:'0,34',AED:'8,76',JPY:'0,21'};\n    const currencies = Object.keys(rates).map(c => ({ code:c, base:c+' 1', rate:rates[c] }));\n\n    const forecast = [\n      {day:'PZT', icon:'☀️', hi:'25°', lo:'18°'},\n      {day:'SAL', icon:'⛅', hi:'24°', lo:'17°'},\n      {day:'ÇAR', icon:'🌦️', hi:'21°', lo:'16°'},\n      {day:'PER', icon:'☀️', hi:'26°', lo:'19°'},\n    ];\n\n    const tagColors = { 'Kirli':'#d97706', 'Temizleniyor':'#2563eb', 'Bekliyor':'#7c3aed', 'Temiz':'#059669' };\n    const sevMap = { 'Yüksek':{fg:'#dc2626',bg:'#fef2f2'}, 'Orta':{fg:'#ea580c',bg:'#fff7ed'}, 'Düşük':{fg:'#059669',bg:'#ecfdf5'} };\n    const prMap = { 'Acil':{fg:'#dc2626',bg:'#fef2f2'}, 'VIP':{fg:'#b45309',bg:'#fef9ec'}, 'Normal':{fg:'#475569',bg:'#f1f5f9'} };\n\n    const hk = this.state.hk.map(i => ({ ...i, tagColor: tagColors[i.tag]||'#64748b', onComplete: () => this.complete('hk', i.id) }));\n    const faults = this.state.faults.map(i => { const c = sevMap[i.sev]||sevMap['Düşük']; return { ...i, sevFg:c.fg, sevBg:c.bg, onComplete: () => this.complete('faults', i.id) }; });\n    const requests = this.state.requests.map(i => { const c = prMap[i.pr]||prMap['Normal']; return { ...i, prFg:c.fg, prBg:c.bg, onComplete: () => this.complete('requests', i.id) }; });\n\n    const TPL = {\n      operasyon: { label:'Özel · Operasyon', weather:true,  ops:true  },\n      kompakt:   { label:'Kompakt · midnight', weather:false, ops:true  },\n      klasik:    { label:'Klasik · midnight',  weather:false, ops:false },\n    };\n    const cur = TPL[this.state.template] || TPL.operasyon;\n    const tplMeta = [\n      { id:'operasyon', name:'Operasyon Paneli', desc:'Hava durumu + housekeeping, arıza ve misafir talepleri açık.', saved:true },\n      { id:'kompakt',   name:'Kompakt',          desc:'Operasyon panelleri açık, hava durumu kartı gizli.',          saved:false },\n      { id:'klasik',    name:'Klasik',           desc:'Sade görünüm — yalnızca oda rack ve varış/uyarı kartları.',    saved:false },\n    ];\n    const templates = tplMeta.map(t => {\n      const active = t.id === this.state.template;\n      const m = TPL[t.id];\n      return { ...t, active, pvWeather:m.weather, pvOps:m.ops,\n        borderCol: active ? '#10b981' : '#e7e9ee',\n        btnLabel:  active ? '✓ Aktif Şablon' : 'Bu Şablonu Uygula',\n        btnBg:     active ? '#ecfdf5' : '#10b981',\n        btnFg:     active ? '#047857' : '#ffffff',\n        btnBorder: active ? '#a7f3d0' : '#10b981',\n        onApply: () => this.setTemplate(t.id) };\n    });\n\n    return {\n      visibleFloors, floorTabs, legend, currencies, forecast,\n      showWeather: cur.weather, showOps: cur.ops, templateLabel: cur.label,\n      templates, galleryOpen: this.state.galleryOpen,\n      openGallery: () => this.setState({ galleryOpen: true }),\n      closeGallery: () => this.setState({ galleryOpen: false }),\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      hk, faults, requests,\n      hkCount: hk.length, faultCount: faults.length, reqCount: requests.length,\n      hkEmpty: hk.length === 0, faultEmpty: faults.length === 0, reqEmpty: requests.length === 0,\n      doneTotal: this.state.done, dndCount: 1,\n      cleanLabel: (68 + this.state.done) + ' / ' + (2),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
