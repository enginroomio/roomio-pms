# Render production secrets (JWT + VAPID) + deploy tetikleme.
# Önkoşul: GitHub repo → Settings → Secrets → RENDER_API_KEY
# Çalıştır: Actions → Render go-live secrets → Run workflow
name: Render go-live secrets

on:
  workflow_dispatch:

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate VAPID keys
        run: npm run vapid:gen

      - name: Set Render secrets and deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_NAME: roomio-pms-v2
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::GitHub repo secret RENDER_API_KEY gerekli (Render Dashboard → Account Settings → API Keys)"
            exit 1
          fi
          node scripts/render-set-secrets.mjs

      - name: Verify production health
        run: |
          for i in $(seq 1 24); do
            body=$(curl -fsS "https://www.roomio.web.tr/api/health" || true)
            if echo "$body" | grep -q '"ok":true'; then
              echo "✓ Health OK"
              echo "$body" | head -c 500
              exit 0
            fi
            echo "Bekleniyor ($i/24)…"
            sleep 15
          done
          echo "::warning::Health henüz OK değil — Render deploy 2-5 dk sürebilir"
          curl -sS "https://www.roomio.web.tr/api/health" | head -c 800 || true
