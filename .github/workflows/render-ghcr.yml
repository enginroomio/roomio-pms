# GitHub Actions'ta Docker build (7GB RAM) → GHCR → Render "Existing Image"
name: Render GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/roomio-pms:latest
            ghcr.io/${{ github.repository_owner }}/roomio-pms:${{ github.sha }}

      # Render "Existing Image" otomatik yenileme — bir kez RENDER_DEPLOY_HOOK_URL secret ekleyin
      - name: Trigger Render deploy
        if: success()
        continue-on-error: true
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL yok — Render Dashboard → Manual Deploy gerekir"
            exit 0
          fi
          if curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"; then
            echo "Render deploy tetiklendi"
          else
            echo "::warning::Render deploy hook HTTP hatası — image yine de GHCR'da; Manual Deploy gerekebilir"
          fi
