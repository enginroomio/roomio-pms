name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: file:${{ github.workspace }}/.roomio-data/ci.db
      ROOMIO_JWT_SECRET: ci-test-secret-at-least-32-characters-long
      ROOMIO_AUTH_REQUIRED: '0'
      ROOMIO_DEMO_AUTH: '1'
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema
        run: mkdir -p .roomio-data && npm run db:push && npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      # next lint requires interactive ESLint setup — typecheck + build yeterli
      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: npx next start -H 127.0.0.1 -p 3100 &
        env:
          NODE_ENV: production
          ROOMIO_DEMO_AUTH: '1'

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3100/api/health | grep -q '"ok":true'; then exit 0; fi
            sleep 2
          done
          echo "Server did not become healthy" >&2
          exit 1

      - name: Route smoke tests
        run: npm run test:routes
        env:
          ROOMIO_URL: http://127.0.0.1:3100

      - name: Integration smoke tests
        run: npm run test:integrations
        env:
          ROOMIO_URL: http://127.0.0.1:3100

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          ROOMIO_URL: http://127.0.0.1:3100
          PLAYWRIGHT_REUSE_SERVER: '1'
          ROOMIO_AUTH_REQUIRED: '0'

  docker:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t roomio-pms:ci .
