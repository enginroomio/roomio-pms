name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: file:.roomio-data/ci.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema
        run: mkdir -p .roomio-data && npm run db:push

      - name: Typecheck
        run: npm run typecheck

      # next lint requires interactive ESLint setup — typecheck + build yeterli
      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: npm run start &

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3100/api/health >/dev/null; then exit 0; fi
            sleep 2
          done
          echo "Server did not become healthy" >&2
          exit 1

      - name: Route smoke tests
        run: npm run test:routes
        env:
          ROOMIO_URL: http://127.0.0.1:3100

      - name: Integration smoke tests
        run: npm run test:integrations
        env:
          ROOMIO_URL: http://127.0.0.1:3100

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          ROOMIO_URL: http://127.0.0.1:3100

  docker:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t roomio-pms:ci .
